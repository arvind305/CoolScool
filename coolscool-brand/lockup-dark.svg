<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 56" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="56" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>
  <!-- Purple box with elephant -->
  <rect x="0" y="0" width="56" height="56" rx="14" fill="url(#bg)"/>
  <!-- Head -->
  <path d="M28,9 C22,9 17,15 17,22 L17,28 C17,30 19,31 21,31 L35,31 C37,31 39,30 39,28 L39,22 C39,15 34,9 28,9Z"
        fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- Left ear -->
  <path d="M17,19 C13,16 9,18 9,24 C9,28 13,30 17,27"
        fill="rgba(251,146,60,0.2)" stroke="#FB923C" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- Right ear -->
  <path d="M39,19 C43,16 47,18 47,24 C47,28 43,30 39,27"
        fill="rgba(251,146,60,0.2)" stroke="#FB923C" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- Trunk -->
  <path d="M28,31 C28,36 26,40 23,42 C20,44 18,42 20,40"
        stroke="#FB923C" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  <!-- Left eye -->
  <circle cx="24" cy="21" r="2.6" fill="white" opacity="0.92"/>
  <circle cx="24.8" cy="20.4" r="1.1" fill="#4C1D95"/>
  <!-- Right eye -->
  <circle cx="32" cy="21" r="2.6" fill="white" opacity="0.92"/>
  <circle cx="32.8" cy="20.4" r="1.1" fill="#4C1D95"/>
  <!-- Wordmark -->
  <text x="72" y="40" font-family="'Plus Jakarta Sans', sans-serif" font-weight="700" font-size="34" fill="#FAFAF9" letter-spacing="-0.3">Cool<tspan fill="#FB923C" font-weight="800">S</tspan>cool</text>
</svg>
